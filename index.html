<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Roleta Personalizada</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">

    <!-- Cabeçalho -->
    <header class="app-header">
        <div class="header-content">
            <button id="btn-back" class="btn btn-outline" style="display: none;">⬅ Menu</button>
            <h1>Mega Roleta</h1>
            <div class="theme-selector">
                <label for="theme-select">Tema:</label>
                <select id="theme-select">
                    <optgroup label="Escuros">
                        <option value="dark">Escuro Padrão</option>
                        <option value="neon">Neon</option>
                        <option value="cyberpunk">Cyberpunk</option>
                        <option value="matrix">Matrix</option>
                        <option value="midnight">Meia-noite</option>
                        <option value="eclipse">Eclipse</option>
                        <option value="obsidian">Obsidiana</option>
                        <option value="amethyst">Ametista</option>
                    </optgroup>
                    <optgroup label="Claros">
                        <option value="light">Claro Padrão</option>
                        <option value="snow">Neve</option>
                        <option value="sunset">Pôr do Sol</option>
                        <option value="aurora">Aurora</option>
                        <option value="paper">Papel</option>
                    </optgroup>
                </select>
            </div>
        </div>
    </header>

    <main class="app-container">

        <!-- Visão 1: Menu de Roletas (Dashboard) -->
        <section id="dashboard-view" class="view-section active">
            <div class="dashboard-header">
                <h2>Minhas Roletas</h2>
                <button id="btn-new-roulette" class="btn btn-primary">+ Criar Nova Roleta</button>
            </div>
            <div id="roulettes-grid" class="roulettes-grid">
                <!-- Cards injetados via JS -->
            </div>
        </section>

        <!-- Visão 2: Editor / Roleta -->
        <section id="editor-view" class="view-section" style="display: none;">
            <!-- Painel Esquerdo: Roleta -->
            <section class="roulette-section glass-panel">
                <div class="roulette-header">
                    <h2 id="current-roulette-title" class="roulette-title-display">Minha Roleta</h2>
                </div>

                <div class="canvas-container">
                    <canvas id="roulette-canvas" width="450" height="450"></canvas>
                    <div id="pointer" class="pointer"></div>
                </div>

                <button id="btn-spin" class="btn btn-spin">GIRAR A ROLETA</button>
            </section>

            <!-- Painel Direito: Configurações -->
            <section class="config-section glass-panel">
                <div class="config-scroll">
                    <div class="config-header-row">
                        <h2>Configurações</h2>
                        <div class="config-actions">
                            <button id="btn-duplicate-roulette" class="btn btn-outline btn-sm" title="Duplicar">Copiar</button>
                            <button id="btn-delete-roulette" class="btn btn-danger btn-sm" title="Excluir">🗑</button>
                        </div>
                    </div>

                <div class="config-group">
                    <label>Nome da Roleta:</label>
                    <input type="text" id="input-roulette-name" class="input-text">
                </div>

                <div class="config-group">
                    <label>Cor do Ponteiro:</label>
                    <input type="color" id="input-pointer-color" value="#ff0000">
                </div>

                <div class="advanced-toggle-container">
                    <label class="switch">
                        <input type="checkbox" id="toggle-advanced">
                        <span class="slider round"></span>
                    </label>
                    <span>Modo Avançado (Pesos e Mensagens)</span>
                </div>

                <div class="options-header">
                    <h3>Opções (<span id="options-count">0</span>)</h3>
                    <button id="btn-add-option" class="btn btn-success btn-sm">+ Opção</button>
                </div>

                <div id="options-list" class="options-list">
                    <!-- Itens injetados via JS -->
                </div>
                </div>
            </section>
        </section>

    </main>

    <!-- Modal de Vitória -->
    <div id="winner-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h2 id="winner-title" style="white-space: pre-wrap; word-break: break-word;">Temos um ganhador!</h2>
            <div id="winner-image-container" style="display: none; margin: 15px 0;">
                <img id="winner-image" src="" alt="Winner Image" style="max-width: 100%; max-height: 250px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
            </div>
            <div id="winner-message" class="winner-message"></div>
            <button id="btn-close-modal" class="btn btn-primary">Fechar</button>
        </div>
    </div>

    <!-- Canvas para os confetes -->
    <canvas id="confetti-canvas"></canvas>

    <script src="db.js"></script>
    <script src="script.js"></script>
</body>
</html>
