<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Roleta Personalizada</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body data-theme="dark">

    <!-- Cabeçalho -->
    <header class="app-header">
        <div class="header-content">
            <button id="btn-back" class="btn btn-outline" style="display: none;"><i class="fa-solid fa-arrow-left"></i> Menu</button>
            <h1>Mega Roleta</h1>
            <div class="theme-selector">
                <div class="theme-dropdown" id="theme-dropdown">
                    <button class="theme-dropdown-btn" id="theme-dropdown-btn">
                        <span id="theme-dropdown-label">Tema: Escuro Padrão</span> <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="theme-dropdown-menu" id="theme-dropdown-menu">
                        <div class="theme-dropdown-group">Escuros</div>
                        <button class="theme-dropdown-item" data-theme-val="dark">Escuro Padrão</button>
                        <button class="theme-dropdown-item" data-theme-val="neon">Neon</button>
                        <button class="theme-dropdown-item" data-theme-val="midnight">Meia-noite</button>
                        <button class="theme-dropdown-item" data-theme-val="eclipse">Eclipse</button>
                        <button class="theme-dropdown-item" data-theme-val="obsidian">Obsidiana</button>
                        <button class="theme-dropdown-item" data-theme-val="amethyst">Ametista</button>
                        <button class="theme-dropdown-item" data-theme-val="abismo-azul">Abismo Azul</button>
                        <button class="theme-dropdown-item" data-theme-val="bordo">Bordô</button>

                        <div class="theme-dropdown-group">Claros</div>
                        <button class="theme-dropdown-item" data-theme-val="light">Claro Padrão</button>
                        <button class="theme-dropdown-item" data-theme-val="snow">Neve</button>
                        <button class="theme-dropdown-item" data-theme-val="sunset">Pôr do Sol</button>
                        <button class="theme-dropdown-item" data-theme-val="aurora">Aurora</button>
                        <button class="theme-dropdown-item" data-theme-val="paper">Papel</button>
                        <button class="theme-dropdown-item" data-theme-val="vibe-sunset">Vibe Sunset</button>
                        <button class="theme-dropdown-item" data-theme-val="linho">Linho</button>
                        <button class="theme-dropdown-item" data-theme-val="menta">Menta</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="app-container">

        <!-- Visão 1: Menu de Roletas (Dashboard) -->
        <section id="dashboard-view" class="view-section active">
            <div class="dashboard-header">
                <h2>Minhas Roletas</h2>

            </div>
            <div id="roulettes-grid" class="roulettes-grid">
                <!-- Cards injetados via JS -->
            </div>
        </section>

        <!-- Visão 2: Editor / Roleta -->
        <section id="editor-view" class="view-section editor-layout" style="display: none;">
            <!-- Painel Esquerdo: Roleta -->
            <section class="roulette-section glass-panel">
                <div class="roulette-header" style="display: flex; align-items: center; justify-content: center; width: 100%; position: relative; gap: 15px;">
                    <h2 id="current-roulette-title" class="roulette-title-display" style="margin:0;">Minha Roleta</h2>
                    <button id="btn-edit-roulette" class="btn btn-outline btn-sm" style="border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;" title="Editar Roleta"><i class="fa-solid fa-pen"></i></button>
                </div>

                <div class="canvas-container">
                    <canvas id="roulette-canvas" width="450" height="450"></canvas>
                    <div id="pointer" class="pointer"></div>
                </div>

                <button id="btn-spin" class="btn btn-spin">GIRAR A ROLETA</button>
                <div id="elimination-history-container" style="display: none; margin-top: 20px; width: 100%;">
                    <h4 style="margin-bottom: 10px; font-size: 0.9rem; opacity: 0.8; text-align: center;">Ordem de Eliminação:</h4>
                    <div id="elimination-history" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;"></div>
                </div>
            </section>

            <!-- Painel Direito: Configurações -->
            <section class="config-section glass-panel">
                <div class="config-scroll">
                    <div class="config-header-row">
                        <h2>Configurações</h2>
                        <div class="config-actions" style="display: flex; gap: 5px;">
                            <button id="btn-save-edit" class="btn btn-success btn-sm">Salvar</button>
                            <button id="btn-cancel-edit" class="btn btn-danger btn-sm">Cancelar</button>
                            <button id="btn-save-template" class="btn btn-outline btn-sm" title="Salvar como Modelo"><i class="fa-solid fa-star"></i></button>

                        </div>
                    </div>

                <div class="config-group">
                    <label>Nome da Roleta:</label>
                    <input type="text" id="input-roulette-name" class="input-text">
                </div>

                <div class="config-group">
                    <label>Cor do Ponteiro:</label>
                    <input type="color" id="input-pointer-color" value="#ff0000">
                </div>

                <div class="advanced-toggle-container">
                        <label class="switch">
                            <input type="checkbox" id="toggle-advanced">
                            <span class="slider round"></span>
                        </label>
                        <span>Modo Avançado (Pesos e Mensagens)</span>
                    </div>
                    <div class="advanced-toggle-container" style="margin-top: 10px;">
                        <label class="switch">
                            <input type="checkbox" id="toggle-elimination">
                            <span class="slider round"></span>
                        </label>
                        <span>Modo Eliminação</span>
                    </div>

                <div class="options-header">
                    <h3>Opções (<span id="options-count">0</span>)</h3>
                    <button id="btn-add-option" class="btn btn-success btn-sm">+ Opção</button>
                </div>

                <div id="options-list" class="options-list">
                    <!-- Itens injetados via JS -->
                </div>
                </div>
            </section>
        </section>

    </main>


    <!-- Modal de Criação (Templates) -->
    <div id="create-modal" class="modal-overlay">
        <div class="modal-content glass-panel" style="width: 90%; max-width: 600px; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--panel-border); padding-bottom: 10px; margin-bottom: 15px;">
                <h2 style="margin: 0; font-size: 1.3rem;">Nova Roleta</h2>
                <div style="display: flex; gap: 10px;">
                    <button id="tab-blank" class="btn btn-outline btn-sm active" title="Criar do Zero" style="width: 40px; height: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center;"><i class="fa-solid fa-file-circle-plus"></i></button>
                    <button id="tab-template" class="btn btn-outline btn-sm" title="Criar a partir de Modelo" style="width: 40px; height: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center;"><i class="fa-solid fa-layer-group"></i></button>
                </div>
            </div>

            <!-- Area de preview generico -->
            <div style="display: flex; justify-content: center; margin-bottom: 15px;">
                <canvas id="preview-canvas" width="150" height="150" style="border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3); background: var(--bg-color); border: 2px solid var(--panel-border);"></canvas>
            </div>

            <!-- Formulário Blank -->
            <div id="create-blank-area">
                <label style="font-size: 0.9rem; font-weight: 500;">Nome da Roleta</label>
                <input type="text" id="create-roulette-name" class="input-text" placeholder="Ex: Minha Nova Roleta..." style="width: 100%; padding: 12px; margin-top: 5px; font-size: 1rem; border-radius: 8px;">
            </div>

            <!-- Templates Area (Hidden default) -->
            <div id="create-template-area" style="display: none; flex-direction: column; gap: 15px;">
                <div>
                    <label style="font-size: 0.9rem; font-weight: 500; display: block; margin-bottom: 8px;">Seus Modelos (Salvos)</label>
                    <div id="user-templates-list" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;" class="config-scroll">
                        <div style="color: rgba(255,255,255,0.5); font-size: 0.85rem; padding: 10px;">Nenhum modelo salvo. Salve uma roleta usando o ícone de disquete nas configurações.</div>
                    </div>
                </div>
                <div>
                    <label style="font-size: 0.9rem; font-weight: 500; display: block; margin-bottom: 8px;">Modelos Padrões</label>
                    <div id="default-templates-list" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;" class="config-scroll">
                        <!-- Gerados via JS -->
                    </div>
                </div>
                <input type="hidden" id="selected-template-id" value="">
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                <button id="btn-cancel-create" class="btn btn-outline">Cancelar</button>
                <button id="btn-confirm-create" class="btn btn-primary">Criar Roleta</button>
            </div>
        </div>
    </div>
    <!-- Modal de Vitória -->
    <div id="winner-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h2 id="winner-title" style="white-space: pre-wrap; word-break: break-word;">Temos um ganhador!</h2>
            <div id="winner-image-container" style="display: none; margin: 15px 0;">
                <img id="winner-image" src="" alt="Winner Image" style="max-width: 100%; max-height: 250px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);">
            </div>
            <div id="winner-message" class="winner-message"></div>
            <button id="btn-close-modal" class="btn btn-primary">Fechar</button>
        </div>
    </div>

    <!-- Canvas para os confetes -->
    <canvas id="confetti-canvas"></canvas>

    <script src="db.js"></script>
    <script src="script.js"></script>
<div id="toast-container" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px;"></div>
</body>
</html>
