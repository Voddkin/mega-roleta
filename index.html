<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Roleta Personalizada</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body data-theme="dark">

    <!-- Cabeçalho -->
    <header class="app-header">
        <div class="header-content">
            <button id="btn-back" class="btn btn-outline" onclick="window.history.back()">⬅ Voltar</button>
            <h1>Mega Roleta</h1>
            <div class="theme-selector">
                <label for="theme-select">Tema:</label>
                <select id="theme-select">
                    <option value="dark">Escuro</option>
                    <option value="light">Claro</option>
                    <option value="neon">Neon</option>
                </select>
            </div>
        </div>
    </header>

    <main class="app-container">
        
        <!-- Painel Esquerdo: Roleta -->
        <section class="roulette-section glass-panel">
            <div class="roulette-header">
                <select id="roulette-selector" class="main-select"></select>
                <button id="btn-new-roulette" class="btn btn-primary">+ Nova</button>
                <button id="btn-delete-roulette" class="btn btn-danger">🗑 Excluir</button>
            </div>

            <div class="canvas-container">
                <canvas id="roulette-canvas" width="500" height="500"></canvas>
                <div id="pointer" class="pointer"></div>
            </div>

            <button id="btn-spin" class="btn btn-spin">GIRAR A ROLETA</button>
        </section>

        <!-- Painel Direito: Configurações -->
        <section class="config-section glass-panel">
            <div class="config-scroll">
                <h2>Configurações da Roleta</h2>
            
            <div class="config-group">
                <label>Nome da Roleta:</label>
                <input type="text" id="input-roulette-name" class="input-text">
            </div>

            <div class="config-group">
                <label>Cor do Ponteiro:</label>
                <input type="color" id="input-pointer-color" value="#ff0000">
            </div>

            <div class="advanced-toggle-container">
                <label class="switch">
                    <input type="checkbox" id="toggle-advanced">
                    <span class="slider round"></span>
                </label>
                <span>Modo Avançado (Pesos e Mensagens)</span>
            </div>

            <div class="options-header">
                <h3>Opções</h3>
                <button id="btn-add-option" class="btn btn-success">+ Adicionar Opção</button>
            </div>

            <div id="options-list" class="options-list">
                <!-- Itens injetados via JS -->
            </div>
            </div>
        </section>

    </main>

    <!-- Modal de Vitória -->
    <div id="winner-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h2 id="winner-title">Temos um ganhador!</h2>
            <div id="winner-message" class="winner-message"></div>
            <button id="btn-close-modal" class="btn btn-primary">Fechar</button>
        </div>
    </div>

    <!-- Canvas para os confetes -->
    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
